name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ hashFiles('eslint.config.js') }}
          restore-keys: eslint-

      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Create Sentry release and upload source maps
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: sola-ai
          SENTRY_PROJECT: sola-ai
          BUILD_SOURCEMAP: 'true'
        run: |
          bun add --global @sentry/cli@2.39.1
          bun run build
          VERSION=$(sentry-cli releases propose-version)
          sentry-cli releases new "$VERSION"
          sentry-cli releases set-commits "$VERSION" --auto --ignore-missing
          sentry-cli sourcemaps upload --release="$VERSION" apps/sola-ai/dist
          sentry-cli releases finalize "$VERSION"
          find apps/sola-ai/dist -name '*.map' -delete

      - run: bun run type-check
      - run: bun run lint
      - run: bun run test

  deploy:
    needs: main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: bash <(curl -fsSL cli.new)
      - name: Deploy frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service e3b9bd7a-f441-4341-8894-af5d6c577768 --ci
      - name: Deploy server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service c427c6e2-d0ba-48a3-98fb-5c7890b3cc76 --ci
